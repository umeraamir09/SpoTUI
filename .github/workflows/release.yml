name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            name: linux-x64
            ext: ""
          - os: ubuntu-latest
            target: bun-linux-arm64
            name: linux-arm64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            name: darwin-arm64
            ext: ""
          - os: macos-13
            target: bun-darwin-x64
            name: darwin-x64
            ext: ""
          - os: windows-latest
            target: bun-windows-x64
            name: win-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=${{ matrix.target }} ./src/index.tsx --outfile dist/spotui-${{ matrix.name }}${{ matrix.ext }} --minify
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotui-${{ matrix.name }}
          path: dist/spotui-${{ matrix.name }}${{ matrix.ext }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          cd artifacts
          sha256sum */spotui-* > checksums.txt
          cat checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect binaries
        run: |
          mkdir release-assets
          find artifacts -type f \( -name "spotui-*" -o -name "checksums.txt" \) -exec cp {} release-assets/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
